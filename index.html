<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convergence Workspace | Production Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #08090a;
            --cyan: #00f0ff;
            --orange: #ff6b00;
        }
        body {
            background-color: var(--obsidian);
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo-glow {
            filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.3));
        }
        .btn-primary {
            display: inline-block;
            padding: 1rem 2rem;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 2rem;
            border-radius: 4px;
            text-decoration: none;
        }
        .btn-primary:hover {
            background: var(--cyan);
            color: var(--obsidian);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }
        .telemetry-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }
        .status-dot {
            height: 6px;
            width: 6px;
            background-color: var(--cyan);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px var(--cyan);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="glass-card">
        <!-- Corrected Logo Reference -->
        <img src="{{DATA:IMAGE:IMAGE_320}}" alt="Convergence Logo" class="w-32 h-32 mx-auto mb-8 logo-glow rounded-3xl">
        
        <h1 class="text-4xl font-bold tracking-tighter mb-2 font-['Syne']">CONVERGENCE</h1>
        <p class="text-xs tracking-[0.3em] text-white/50 mb-8 uppercase">Production Suite // V4.2 Hardened</p>
        
        <p class="text-sm text-white/70 leading-relaxed mb-8">
            Global node synchronization complete. <br>
            All creative pillars are active and verified.
        </p>
        
        <a href="production/index.html" class="btn-primary">Launch Workspace</a>
        
        <div class="telemetry-row">
            <div><span class="status-dot"></span> SYSTEM_ONLINE</div>
            <div>LATENCY: 12.4MS</div>
            <div>SEC: AES-256</div>
        </div>
    </div>
</body>
</html>
