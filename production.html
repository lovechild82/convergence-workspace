<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Workspace Hub | V5.5 Haptic Refined</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD@20..48,100..700,0..1,-25..0" />
    <style>
        :root {
            --obsidian: #08090a;
            --cyan: #00f0ff;
            --orange: #ffb690;
            --purple: #a855f7;
        }
        body {
            background-color: var(--obsidian);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            width: 100%;
        }
        .font-syne { font-family: 'Syne', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 300ms ease-out;
        }
        .glow-cyan { box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); }
        .text-gradient {
            background: linear-gradient(135deg, #ffdbca 0%, #ffb690 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill-cyan { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
        .progress-fill-orange { background: #ffb690; box-shadow: 0 0 8px #ffb690; }

        .material-symbols-outlined {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.5em;
            height: 1.5em;
            vertical-align: middle;
            font-size: 24px;
            flex-shrink: 0;
        }

        .haptic-target {
            transition: transform 75ms cubic-bezier(0.4, 0, 0.2, 1), background-color 200ms ease;
        }
        .haptic-target:active {
            transform: scale(0.97);
        }
        .pillar-card:hover {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .bg-layer {
            pointer-events: none;
            user-select: none;
            z-index: 0;
        }
        main {
            position: relative;
            z-index: 10;
        }
        @media (max-width: 380px) {
            .pillar-label { font-size: 8px !important; }
            .pillar-card { padding: 12px !important; }
        }
    </style>
</head>
<body class="pb-24 pt-16">

    <div class="fixed inset-0 bg-layer opacity-20"
         style="background-image: radial-gradient(var(--cyan) 0.5px, transparent 0.5px); background-size: 24px 24px;">
    </div>

    <div class="fixed top-[-10%] right-[-10%] w-[400px] h-[400px] rounded-full blur-[100px] opacity-10 bg-layer"
         style="background: var(--purple);">
    </div>

    <header class="fixed top-0 left-0 right-0 h-16 glass-panel border-b border-white/5 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-cyan-400">grid_view</span>
            <div>
                <h1 class="font-syne text-xs font-bold tracking-tighter leading-tight">
                    CONVERGENCE_WORKSPACE
                </h1>
                <p class="font-mono text-[10px] text-white/40 uppercase">
                    V5.5 HARDENED
                </p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="text-right hidden xs:block">
                <p class="text-[10px] font-mono text-cyan-400 uppercase">STATUS</p>
                <p class="text-[10px] font-mono flex items-center justify-end gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
                    NOMINAL
                </p>
            </div>

            <img
                src="https://lh3.googleusercontent.com/aida-public/AL68YI9T2nLpS_o6QvX_6Y9z9LqZ7H_VzK-y9oX-W7E"
                class="w-8 h-8 rounded-full border border-white/20"
                alt="Avatar"
            >
        </div>
    </header>

    <main class="px-5 space-y-6 max-w-lg mx-auto w-full">

        <section class="glass-panel rounded-2xl p-6 glow-cyan">
            <p class="font-mono text-[10px] text-white/40 mb-2">
                ID: SYNC_ENGINE_V5.5 // USER: lovechild82
            </p>

            <h2 class="font-syne text-3xl font-extrabold tracking-tighter text-gradient leading-none mb-6 uppercase">
                V5.5 HARDENED<br>SYSTEM ONLINE
            </h2>

            <div class="space-y-4 text-white">

                <div class="flex justify-between font-mono text-[10px] mb-2 uppercase">
                    <span>SYNC_PROGRESS</span>
                    <span class="text-cyan-400">100.00%</span>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill-cyan h-full w-full"></div>
                </div>

                <div class="grid grid-cols-3 gap-2 border-t border-white/5 pt-4 text-center">

                    <div>
                        <p class="text-[9px] font-mono text-white/40 uppercase">Encryption</p>
                        <p class="text-xs font-mono text-orange-200">AES-4096</p>
                    </div>

                    <div class="border-x border-white/5">
                        <p class="text-[9px] font-mono text-white/40 uppercase">Latency</p>
                        <p class="text-xs font-mono text-cyan-400">0.02ms</p>
                    </div>

                    <div>
                        <p class="text-[9px] font-mono text-white/40 uppercase">Uptime</p>
                        <p class="text-xs font-mono">99.9%</p>
                    </div>

                </div>
            </div>
        </section>

        <section class="grid grid-cols-2 gap-4 text-white">

            <div class="glass-panel rounded-xl p-4">
                <p class="font-mono text-[9px] text-white/40 uppercase mb-1">NODE_CORE_01</p>
                <p class="font-syne text-lg">
                    128 <span class="text-[10px] font-mono text-white/40">CORES</span>
                </p>

                <div class="mt-3 progress-bar">
                    <div class="progress-fill-orange h-full w-[74%]"></div>
                </div>

                <p class="text-right text-[9px] font-mono mt-1 text-white/40 uppercase">
                    74%
                </p>
            </div>

            <div class="glass-panel rounded-xl p-4">
                <p class="font-mono text-[9px] text-white/40 uppercase mb-1">THERMAL_SENSE</p>

                <p class="font-syne text-lg">
                    42 <span class="text-[10px] font-mono text-white/40">°C</span>
                </p>

                <div class="mt-3 progress-bar">
                    <div class="progress-fill-cyan h-full w-[40%]"></div>
                </div>

                <p class="text-right text-[9px] font-mono mt-1 text-cyan-400 uppercase font-bold">
                    STABLE
                </p>
            </div>

        </section>

    </main>

</body>
</html>
